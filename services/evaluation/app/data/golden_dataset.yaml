# Compass RAG 15-Question Golden Dataset
# Contains exact category counts: 4 directly_answerable, 3 ocr_dependent, 3 contradictory_document, 2 ambiguous, 3 unanswerable.

- id: Q1
  category: directly_answerable
  question: "What is the annual hardware stipend amount for purchasing IT equipment?"
  expected_answer: "Every full-time employee is entitled to a $1,500 annual hardware stipend for purchasing laptops, monitors, and ergonomic accessories."
  expected_keywords: ["1,500", "hardware", "stipend"]
  expected_chunk_ids: ["handbook_2026.pdf"]
  should_abstain: false

- id: Q2
  category: directly_answerable
  question: "Between what hours must employees be available for synchronous collaboration?"
  expected_answer: "All staff must be available for synchronous collaboration between 10:00 AM and 3:00 PM EST Monday through Friday."
  expected_keywords: ["10:00 AM", "3:00 PM", "synchronous"]
  expected_chunk_ids: ["handbook_2026.pdf"]
  should_abstain: false

- id: Q3
  category: directly_answerable
  question: "How many paid annual leave days do employees receive each year and how many can be carried over?"
  expected_answer: "Employees receive 20 days of paid annual leave per year, and up to 5 unused leave days can be carried over to the following calendar year."
  expected_keywords: ["20 days", "5 unused", "carry-over"]
  expected_chunk_ids: ["handbook_2026.pdf"]
  should_abstain: false

